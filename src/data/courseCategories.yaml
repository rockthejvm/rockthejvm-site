- id: bundle
  color: "#003366"
  description: All of Rock the JVM's bundles in one place.
  longDescription: Rock the JVM bundles bring together complete learning paths at a significant discount, giving you everything you need to go from beginner to expert in a technology stack. Each bundle is carefully curated to take you through the fundamentals, advanced patterns, and real-world projects, so you can master the full ecosystem without hunting for individual courses. Whether you're investing in Scala, Kotlin, Apache Spark, or Akka/Pekko, a bundle is the most efficient and cost-effective way to build deep, production-ready expertise.
  members:
    - the-scala-bundle
    - the-kotlin-bundle
    - the-apache-spark-bundle-with-scala
    - the-akka-apache-pekko-bundle-with-scala
  faqs:
    - question: I've already enrolled in some of the courses but want to take this bundle. Can I pay the difference?
      answer: Yes, you can. To avoid paying for the same content twice, contact me at rockthejvm.com/contact with proof of your previous purchases, and I'll provide a discount to cover the amount you've already paid.
    - question: I'm a senior developer and want to gift this bundle to some junior developers on my team. Can I audit this bundle?
      answer: Absolutely. Feel free to contact me at rockthejvm.com/contact for assistance.
  name: Bundles
  logo: src/images/logos/bundles.png
- id: scala
  color: "#dd3431"
  description: Learn everything there is to know about Scala, from zero to master.
  longDescription: Scala is a powerful, expressive language that combines object-oriented and functional programming on the JVM, and Rock the JVM's Scala track takes you from your very first "Hello, World" all the way through advanced type systems, macros, and metaprogramming. You'll build real intuition for functional design, immutable data, and type-level programming, along with the practical skills to tackle complex codebases and technical interviews. Whether you're a Java developer looking to level up or a dedicated Scala engineer aiming for mastery, this track has a course for every stage of your journey.
  members:
    - scala-at-light-speed
    - scala-essentials
    - scala-projects
    - advanced-scala
    - scala-macros-and-metaprogramming
    - scala-and-functional-programming-interview-practice
    - scala-3-new-features
  faqs:
    - question: I'm just learning to code. Should I start with Scala?
      answer: Probably not directly. While some have learned to code in Scala through Rock the JVM, we don't cover the fundamental computer science topics needed to understand Scala's design and functionality. However, if you want to dive in, go for it! You'll have my support and that of the community whenever you need help.
  name: Scala
  logo: src/images/logos/scala-3.svg
- id: kotlin
  color: "#6b47d2"
  description: Learn everything there is to know about Kotlin, from zero to master.
  longDescription: Kotlin has become one of the most loved languages on the JVM, blending concise syntax, null safety, and powerful abstractions that make writing correct and expressive code a pleasure. Rock the JVM's Kotlin track covers the language from the ground up through advanced coroutines and concurrency, equipping you with the skills to build reliable, high-performance applications on any Kotlin platform. Each course in this track is entirely platform-agnostic, focusing on the language itself so the knowledge you gain applies equally whether you're building backend services, desktop tools, or anything else powered by Kotlin.
  members:
    - kotlin-at-light-speed
    - kotlin-essentials
    - kotlin-coroutines-and-concurrency
    - advanced-kotlin
  faqs:
    - question: Does this course cover Android development?
      answer: No, this course focuses on Kotlin as a programming language, regardless of the platform you use.
    - question: Do you have any affiliation with JetBrains or the Kotlin Foundation?
      answer: No, this course is not affiliated with JetBrains (the creators of Kotlin), Google, or the Kotlin Foundation. However, I hope they'll have positive things to say about it once they see it!
  name: Kotlin
  logo: src/images/logos/kotlin.svg
- id: typelevel
  color: "#fe4559"
  description: Learn everything there is to know about Typelevel, from zero to master.
  longDescription: The Typelevel ecosystem represents the cutting edge of purely functional programming in Scala, offering battle-tested libraries like Cats and Cats Effect that power some of the most demanding production systems in the world. Rock the JVM's Typelevel track guides you through the mathematical foundations of functional abstractions, the principled design of concurrent and effectful programs, and the construction of a complete, real-world application from scratch. By the end of this track you'll be fluent in the vocabulary of functional effects, type classes, and resource safety that defines modern Typelevel engineering.
  members:
    - cats
    - cats-effect
    - typelevel-rite-of-passage
  name: Typelevel
  logo: src/images/logos/typelevel.svg
- id: zio
  color: "#b80000"
  description: Learn everything there is to know about ZIO, from zero to master.
  longDescription: ZIO is a modern, highly ergonomic Scala library for building type-safe, composable, and highly concurrent applications, and its ecosystem has rapidly grown into one of the most productive ways to write functional Scala in production. Rock the JVM's ZIO track takes you from the core concepts of the ZIO runtime—fibers, effects, layers, and dependency injection—through a full-stack, real-world application that demonstrates how all the pieces fit together. Whether you're new to functional effects or migrating an existing codebase, this track will give you the confidence and skills to build resilient, maintainable software with ZIO.
  members:
    - zio
    - zio-rite-of-passage
  name: ZIO
  logo: src/images/logos/zio.png
- id: apache-spark
  color: "#e25a1c"
  name: Apache Spark
  description: Learn everything there is to know about Spark, from zero to master.
  longDescription: Apache Spark is the industry-standard distributed computing engine for processing massive datasets with speed and elegance, and proficiency in Spark is one of the most sought-after skills in the data engineering job market. Rock the JVM's Apache Spark track covers everything from the core DataFrame and Dataset APIs through streaming, performance tuning, and advanced optimization techniques that will make your jobs run faster and cost less. Each course is taught in Scala—the language Spark itself is written in—so you'll gain both deep Spark knowledge and the idiomatic practices that experienced data engineers rely on every day.
  members:
    - apache-spark-essentials-with-scala
    - apache-spark-streaming-with-scala
    - apache-spark-optimization-with-scala
    - apache-spark-performance-tuning-with-scala
  logo: src/images/logos/spark.png
- id: apache-flink
  color: "#e6526f"
  description: Learn everything there is to know about Flink, from zero to master.
  longDescription: Apache Flink is the leading framework for stateful, real-time stream processing, capable of handling billions of events per day with exactly-once guarantees and millisecond latency. Rock the JVM's Apache Flink track gives you a thorough grounding in Flink's DataStream and Table APIs, windowing and event-time semantics, stateful computations, and best practices for deploying reliable streaming pipelines. While the course is taught in Scala, the concepts and APIs are nearly identical in Java, making everything you learn directly applicable regardless of which JVM language your team prefers.
  members:
    - apache-flink-with-scala
  faqs:
    - question: The Scala API has been deprecated in Flink; is this course still relevant?
      answer: That's a valid question. You can safely use the Java language and API in this course, as the Scala API is nearly identical (one reason for its deprecation). Many students have successfully taken this course in Java. We plan to re-record it in Java after Flink releases version 2.0.
  name: Apache Flink
  logo: src/images/logos/flink.png
- id: akka-apache-pekko
  color: "#15a9ce"
  description: Learn everything there is to know about Akka Pekko, from zero to master.
  longDescription: Akka and its open-source fork Apache Pekko are the gold standard for building highly concurrent, distributed, and fault-tolerant systems on the JVM, used by companies processing trillions of events every day. Rock the JVM's Akka/Pekko track walks you through the actor model from first principles, then builds up to reactive streams, HTTP microservices, and production-grade distributed system patterns. Because both Akka and Pekko share an identical API, every skill you develop in this track transfers seamlessly between the two, letting you work confidently in any organization regardless of which library they've chosen.
  members:
    - akka-apache-pekko-essentials-with-scala
    - akka-apache-pekko-streams-with-scala
    - akka-apache-pekko-http-with-scala
  faqs:
    - question: Which do you prefer, Akka or Pekko? What's the difference in coding for the course?
      answer: Both offer identical APIs. If you want to stay open-source, use Pekko; if your company uses (and pays for) Akka, go with that. We set things up at the beginning of the project (either Akka or Pekko), and the IDE will provide the correct package name suggestions. There's very little you need to do beyond that.
  name: Akka/Pekko
  logo: src/images/logos/akka.svg
