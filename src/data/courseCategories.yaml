- id: bundle
  color: "#003366"
  description: All of Rock the JVM's bundles in one place.
  longDescription: Get packs of courses on the same ecosystem at a discount compared to buying courses individually. Each bundle is a complete learning path. By the time you finish a bundle, you'll have all the sskills of a working professional using these tools every day.
  members:
    - the-scala-bundle
    - the-kotlin-bundle
    - the-apache-spark-bundle-with-scala
    - the-akka-apache-pekko-bundle-with-scala
  faqs:
    - question: I've already enrolled in some of the courses but want to take this bundle. Can I pay the difference?
      answer: Yes, you can. To avoid paying for the same content twice, contact me at rockthejvm.com/contact with proof of your previous purchases, and I'll provide a discount to cover the amount you've already paid.
    - question: I'm a senior developer and want to gift this bundle to some junior developers on my team. Can I audit this bundle?
      answer: Absolutely. Feel free to contact me at rockthejvm.com/contact for assistance.
  name: Bundles
  logo: src/images/logos/bundles.png
- id: scala
  color: "#dd3431"
  description: Learn everything there is to know about Scala, and mental models you can take elsewhere.
  longDescription: Scala is a powerful OO + functional language with many features that later inspired Rust, Kotlin, modern Java and others. Learn Scala and you’ll get many transferable skills: domain modeling with algebraic data types, functional programming, type safety, concurrency, implicit resolution, higher kinds, and others. Scala paves the way to actor concurrency and effect systems, if you’re interested.
  members:
    - scala-at-light-speed
    - scala-essentials
    - scala-projects
    - advanced-scala
    - scala-macros-and-metaprogramming
    - scala-and-functional-programming-interview-practice
    - scala-3-new-features
  faqs:
    - question: I'm just learning to code. Should I start with Scala?
      answer: Probably not directly. Though some have learned to code in Scala through Rock the JVM, we don't cover the fundamental computer science topics needed to understand Scala's design and functionality. However, if you want to dive in, go for it! You'll have my support and that of the community whenever you need help.
  name: Scala
  logo: src/images/logos/scala-3.svg
- id: kotlin
  color: "#6b47d2"
  description: Learn everything there is to know about Kotlin, from zero to master.
  longDescription: Kotlin is the “better Java” that many people have been waiting for. By learning Kotlin, you’ll get a good middle ground between the classic principles of Java and the conciseness and power of Scala, plus some idiomatic Kotlin ideas: receivers, coroutines and more. 
  members:
    - kotlin-at-light-speed
    - kotlin-essentials
    - kotlin-coroutines-and-concurrency
    - advanced-kotlin
  faqs:
    - question: Does this course cover Android development?
      answer: No, this course focuses on Kotlin as a programming language, regardless of the platform you use.
    - question: Do you have any affiliation with JetBrains or the Kotlin Foundation?
      answer: No, this course is not affiliated with JetBrains (the creators of Kotlin), Google, or the Kotlin Foundation. However, I hope they'll have positive things to say about it once they see it!
  name: Kotlin
  logo: src/images/logos/kotlin.svg
- id: typelevel
  color: "#fe4559"
  description: Learn the functional programming tools used in production at scale.
  longDescription: Typelevel is a set of functional programming libraries for Scala. Cats and Cats Effect are the two most important libraries in this ecosystem: Cats offers practical implementations of popular monads and other type classes, while Cats Effect is one of the major effect systems in the Scala ecosystem used at scale in critical systems.
  members:
    - cats
    - cats-effect
    - typelevel-rite-of-passage
  name: Typelevel
  logo: src/images/logos/typelevel.svg
- id: zio
  color: "#b80000"
  description: Learn everything there is to know about ZIO, and the mindset of an effect system.
  longDescription: ZIO is one of the major effect systems in the Scala ecosystem, battle tested in production. It’s ergonomic, in the sense that all ZIO code follows similar structure and API shapes, and it’s easy to “lift regular Scala code to ZIO effects. If you learn ZIO, you’ll get a new mental model on effects (computation as values), concurrency and code organization.
  members:
    - zio
    - zio-rite-of-passage
  name: ZIO
  logo: src/images/logos/zio.png
- id: apache-spark
  color: "#e25a1c"
  name: Apache Spark
  description: Learn everything there is to know about Spark, and become a data engineer.
  longDescription: Apache Spark is the standard tool in distributed big data processing, and improving every day. If you want to become a data engineer, Spark is a must. You will learn how data is processed at scale, how distribution works, how to think and organize your data crunching jobs, and how to optimize them for best performance. Since Spark is foundational to data engineering, the concepts you learn here are easily transferable to other tools.
  members:
    - apache-spark-essentials-with-scala
    - apache-spark-streaming-with-scala
    - apache-spark-optimization-with-scala
    - apache-spark-performance-tuning-with-scala
  logo: src/images/logos/spark.png
- id: apache-flink
  color: "#e6526f"
  description: Learn everything there is to know about Flink, with foundational skills in stream processing.
  longDescription: Apache Flink is one of the most popular stateful data stream processing tools, used at scale at major companies. By learning Flink, you’ll learn evergreen concepts in stream processing: event time, processing time, windowing, watermarking etc, with practical examples and projects.
  members:
    - apache-flink-with-scala
  faqs:
    - question: The Scala API has been deprecated in Flink; is this course still relevant?
      answer: That's a valid question. You can safely use the Java language and API in this course, as the Scala API is nearly identical (one reason for its deprecation). Many students have successfully taken this course in Java. We plan to re-record it in Java after Flink releases version 2.0.
  name: Apache Flink
  logo: src/images/logos/flink.png
- id: akka-apache-pekko
  color: "#15a9ce"
  description: Learn everything there is to know about Akka (or its open source version Apache Pekko), with the skills of distributed systems.
  longDescription: Akka (and its open-source Pekko variant) is the most complete actor model implementation on the JVM. Learning this toolkit gives you a completely different mental model on concurrency, code organization, error handling and fault tolerance, event sourcing, clusters and distributed systems along with the many problems and solutions (sharding, singletons, migrations etc).
  members:
    - akka-apache-pekko-essentials-with-scala
    - akka-apache-pekko-streams-with-scala
    - akka-apache-pekko-http-with-scala
  faqs:
    - question: Which do you prefer, Akka or Pekko? What's the difference in coding for the course?
      answer: Both offer identical APIs. If you want to stay open-source, use Pekko; if your company uses (and pays for) Akka, go with that. We set things up at the beginning of the project (either Akka or Pekko), and the IDE will provide the correct package name suggestions. There's very little you need to do beyond that.
  name: Akka/Pekko
  logo: src/images/logos/akka.svg
