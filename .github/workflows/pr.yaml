name: Pull Request
on: [pull_request]
concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
permissions: read-all
jobs:
  trunk_check:
    name: Trunk Code Quality Runner
    runs-on: ubuntu-24.04
    permissions:
      checks: write # trunk PR annotations
      contents: read # code checkout and dependency installation
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cache Astro generated assets
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.astro
            .astro
          key: astro-${{ runner.os }}-${{ hashFiles('astro.config.ts', 'pnpm-lock.yaml', 'src/images/**', 'src/assets/images/**', 'src/data/**/*.{png,jpg,jpeg,webp,avif,gif,svg}') }}
          restore-keys: |
            astro-${{ runner.os }}-
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile && npx astro sync
      - name: Trunk Code Quality
        uses: trunk-io/trunk-action@v1
  astro_check:
    name: Astro Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cache Astro generated assets
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.astro
            .astro
          key: astro-${{ runner.os }}-${{ hashFiles('astro.config.ts', 'pnpm-lock.yaml', 'src/images/**', 'src/assets/images/**', 'src/data/**/*.{png,jpg,jpeg,webp,avif,gif,svg}') }}
          restore-keys: |
            astro-${{ runner.os }}-
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile && npx astro sync
      - name: Astro Check
        run: npx astro check --minimumFailingSeverity error
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Cache Astro generated assets
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.astro
            .astro
          key: astro-${{ runner.os }}-${{ hashFiles('astro.config.ts', 'pnpm-lock.yaml', 'src/images/**', 'src/assets/images/**', 'src/data/**/*.{png,jpg,jpeg,webp,avif,gif,svg}') }}
          restore-keys: |
            astro-${{ runner.os }}-
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile && npx astro sync
      - name: Build
        uses: ./.github/actions/timed-run
        env:
          # Skip the related-articles network call in CI; not needed for the
          # 5 routes Lighthouse audits and avoids flakiness when the worker is slow.
          SKIP_RELATED_ARTICLES: "1"
        with:
          name: Build
          # Measured locally: ~120s warm cache, ~185s cold cache (after the
          # responsive-images audit, which generates ~2x the image variants).
          # Threshold ~60% above cold-cache to absorb GH runner variance.
          # Lower over time as a regression gate.
          max-seconds: "300"
          run: pnpm build
      - name: Run Lighthouse CI
        uses: ./.github/actions/timed-run
        with:
          name: Lighthouse CI
          # Estimate: 5 URLs × 3 runs ≈ 15 audits × ~20s under mobile CPU/network
          # throttling + Chrome boot + assertions ≈ 300-390s on GH runners.
          # Threshold ~25% above estimated max; recalibrate after a few CI runs.
          max-seconds: "480"
          run: pnpm lhci
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          if-no-files-found: ignore
          retention-days: 14
